[package]
name = "rust_yolo"
version = "0.1.1"
edition = "2024"

[dependencies]
# System Monitoring
sysinfo = "0.32"

# Arrow / Zero-Copy
arrow = { version = "58.1.0", features = ["pyarrow", "ffi"] }

# Python Integration (FFI)
pyo3 = { version = "0.28.2", features = ["extension-module"] }
# pythonize = "0.28.0"
# pyo3-async-runtimes = { version = "0.28.0", features = ["tokio-runtime"] }

# Async runtime
# tokio = { version = "1.0", features = ["full"] }
# paste = "1.0"


# ONNX Runtime
ort = { version = "2.0.0-rc.12", features = ["coreml"] }
ndarray = "0.17"
image = "0.25"
rayon = "1.10"

[lib]
name = "rust_yolo"
crate-type = ["cdylib"]
